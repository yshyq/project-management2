services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-registry.cn-hangzhou.aliyuncs.com/mytest_docker123/python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: project-management2-backend:latest
    container_name: project-management2-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/ops_pm.db
      APP_SECRET_KEY: ${APP_SECRET_KEY:-project-management2-change-me-with-at-least-32-bytes}
      PASSWORD_SALT: ${PASSWORD_SALT:-project-management2-salt}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-registry.cn-hangzhou.aliyuncs.com/mytest_docker123/nginx:1.25.4}
    image: project-management2-frontend:latest
    container_name: project-management2-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  backend_data:
